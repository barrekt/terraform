name: Render Excalidraw Diagrams

on:
  pull_request:
    branches: [main]
    paths:
      - 'diagrams/*.excalidraw'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --project scripts

      - name: Install Playwright browsers
        run: uv run --project scripts playwright install chromium --with-deps

      - name: Detect changed excalidraw files
        id: changed
        run: |
          $files = (git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'diagrams/*.excalidraw') -join ' '
          "files=$files" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Render and copy diagrams
        if: steps.changed.outputs.files != ''
        run: |
          $manifest = Get-Content diagrams/manifest.json | ConvertFrom-Json -AsHashtable
          $files = "${{ steps.changed.outputs.files }}" -split '\s+' | Where-Object { $_ }

          foreach ($file in $files) {
            $base = [System.IO.Path]::GetFileNameWithoutExtension($file)

            uv run --project scripts python scripts/render_excalidraw.py `
              $file --output "diagrams/$base.png"

            $excalidrawKey = "diagrams/$base.excalidraw"
            $target = $manifest.Values |
              Where-Object { $_.excalidraw -eq $excalidrawKey } |
              Select-Object -ExpandProperty png

            if ($target) {
              Copy-Item "diagrams/$base.png" $target
              Write-Host "Copied diagrams/$base.png -> $target"
            }
          }

      - name: Commit updated PNGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/*.png modules/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: auto-render updated excalidraw diagrams [skip ci]"
            git push
          }
