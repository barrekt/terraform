name: Update Module Diagrams

on:
  pull_request:
    branches: [main]
    paths:
      - 'modules/**/*.tf'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect changed modules with diagrams
        id: changed
        run: |
          $manifest = Get-Content diagrams/manifest.json | ConvertFrom-Json -AsHashtable
          $changed = git diff --name-only "origin/${{ github.base_ref }}...HEAD" -- 'modules/**/*.tf'
          $modules = [System.Collections.Generic.HashSet[string]]::new()

          foreach ($file in ($changed -split "`n" | Where-Object { $_ })) {
            $dir = Split-Path $file -Parent
            while ($dir -and $dir -ne '.') {
              if ($manifest.ContainsKey($dir)) {
                $modules.Add($dir) | Out-Null
                break
              }
              $dir = Split-Path $dir -Parent
            }
          }

          $moduleList = $modules -join ' '
          "modules=$moduleList" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Node.js
        if: steps.changed.outputs.modules != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        if: steps.changed.outputs.modules != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Install uv
        if: steps.changed.outputs.modules != ''
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        if: steps.changed.outputs.modules != ''
        run: uv sync --project scripts

      - name: Install Playwright browsers
        if: steps.changed.outputs.modules != ''
        run: uv run --project scripts playwright install chromium --with-deps

      - name: Update diagrams
        if: steps.changed.outputs.modules != ''
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          $manifest = Get-Content diagrams/manifest.json | ConvertFrom-Json -AsHashtable
          $modules = "${{ steps.changed.outputs.modules }}" -split '\s+' | Where-Object { $_ }

          foreach ($module in $modules) {
            $excalidraw = $manifest[$module].excalidraw
            $png        = $manifest[$module].png
            $base       = [System.IO.Path]::GetFileNameWithoutExtension($excalidraw)

            git diff "origin/${{ github.base_ref }}...HEAD" -- "$module/*.tf" |
              Out-File -FilePath /tmp/module_diff.txt -Encoding utf8

            @"
          You are updating an Excalidraw architecture diagram to reflect Terraform infrastructure changes.

          Module directory: $module
          Excalidraw file to update: $excalidraw
          Diff file: /tmp/module_diff.txt

          Your task:
          1. Read /tmp/module_diff.txt to understand what changed in the Terraform module
          2. Read the current Excalidraw JSON at $excalidraw
          3. Identify architectural changes: new resources, removed resources, or changed
             configurations that should be reflected visually (e.g. new subnet, removed NSG,
             added route table entry)
          4. Update the Excalidraw JSON -- add, remove, or modify elements to match the new
             architecture
          5. Preserve the existing visual style: dark theme, roughness=1, layout structure,
             color scheme (blue for subnets/VNet containers, red for NSG, green for route tables)
          6. Only touch elements for resources that actually changed
          7. Write the updated JSON back to $excalidraw

          Do not produce a PNG. Do not change colors, canvas background, or layout of
          unchanged elements.
          "@ | Out-File -FilePath /tmp/claude_prompt.txt -Encoding utf8

            claude --dangerously-skip-permissions `
              --allowedTools "Read,Write,Edit" `
              -p (Get-Content /tmp/claude_prompt.txt -Raw)

            uv run --project scripts python scripts/render_excalidraw.py `
              $excalidraw --output "diagrams/$base.png"

            Copy-Item "diagrams/$base.png" $png
            Write-Host "Updated diagram for $module"
          }

      - name: Commit updated diagrams
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/ modules/
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: auto-update diagrams for changed modules [skip ci]"
            git push
          }
